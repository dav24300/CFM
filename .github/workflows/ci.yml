name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_ENV: production
      ADMIN_PASSWORD: admin123
      SESSION_SECRET: ci-session-secret-please-change
      DATA_ENCRYPTION_KEY: ci-encryption-key-32-characters-min
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Start app
        run: npm run start & echo $! > .next-start.pid
        env:
          PORT: "3000"

      - name: Wait for readiness
        shell: bash
        run: |
          for i in {1..45}; do
            if curl -sSf http://localhost:3000/ >/dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready in time"
          exit 1

      - name: Smoke routes
        run: npm run smoke

      - name: Stop app
        if: always()
        shell: bash
        run: |
          if [ -f .next-start.pid ]; then
            kill "$(cat .next-start.pid)" || true
          fi
